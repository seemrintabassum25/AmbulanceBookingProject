{% extends 'core/base.html' %}

{% block content %}
<div class="container py-5">
    <div class="row">
        <div class="col-md-8 mx-auto">
            <div class="card">
                <div class="card-header bg-danger text-white">
                    <h3 class="mb-0">Book an Ambulance</h3>
                </div>
                <div class="card-body">
                    <form method="post">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label for="{{ form.patient_name.id_for_label }}" class="form-label">Patient Name</label>
                            {{ form.patient_name }}
                        </div>

                        <div class="mb-3">
                            <label for="{{ form.patient_age.id_for_label }}" class="form-label">Patient Age</label>
                            {{ form.patient_age }}
                        </div>

                        <div class="mb-3">
                            <label for="{{ form.emergency_details.id_for_label }}" class="form-label">Emergency Details</label>
                            {{ form.emergency_details }}
                        </div>

                        <div class="mb-3">
                            <label for="{{ form.pickup_location.id_for_label }}" class="form-label">Pickup Location</label>
                            {{ form.pickup_location }}
                        </div>

                        <div class="mb-3">
                            <label for="{{ form.dropoff_location.id_for_label }}" class="form-label">Drop-off Location (Hospital)</label>
                            {{ form.dropoff_location }}
                        </div>

                        <div class="mb-3">
                            <label class="form-label">Select Ambulance Type</label>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="ambulance_type" id="basic" value="basic" checked>
                                <label class="form-check-label" for="basic">
                                    Basic Ambulance
                                </label>
                            </div>
                            <div class="form-check">
                                <input class="form-check-input" type="radio" name="ambulance_type" id="advanced" value="advanced">
                                <label class="form-check-label" for="advanced">
                                    Advanced Ambulance
                                </label>
                            </div>
                        </div>

                        <button type="submit" class="btn btn-danger btn-lg w-100">Book Ambulance Now</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    input[type="text"],
    input[type="number"],
    textarea {
        width: 100%;
        padding: 8px;
        border: 1px solid #ddd;
        border-radius: 4px;
    }
</style>
{% endblock %}
